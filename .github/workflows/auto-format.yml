name: Auto format (self-hosted)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'json/**/*.json'
      - '.prettierrc*'
      - '.editorconfig'
      - '.prettierignore'

permissions:
  contents: write

jobs:
  format:
    runs-on: self-hosted

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Mark workspace safe for git (self-hosted)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Prettier
        run: |
          if [ -f package-lock.json ] || [ -f pnpm-lock.yaml ] || [ -f yarn.lock ]; then
            npm ci || npm i
          else
            npm i -D prettier
          fi

      - name: Determine changed JSON files
        id: changes
        shell: bash
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1 || true
          CHANGED=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- 'json/**/*.json' | tr '\n' ' ')
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Run Prettier on changed files (respects .prettierignore)
        if: steps.changes.outputs.changed != ''
        run: |
          npx prettier --write ${{ steps.changes.outputs.changed }}

      - name: Commit & push if formatting changed anything
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(format): auto-format JSON (Prettier)"
            git push
          else
            echo "No formatting changes to commit."
          fi
